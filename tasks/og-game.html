<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        width: 1200px; height: 630px;
        background:
          radial-gradient(1100px 600px at 78% -10%, rgba(167,139,250,0.22), transparent 60%),
          radial-gradient(900px 600px at 8% 120%, rgba(66,133,244,0.20), transparent 55%),
          #0B0F19;
        color: #fff;
        padding: 64px 72px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
      }
      .top { display: flex; align-items: center; justify-content: space-between; }
      .brand { display: flex; align-items: center; gap: 16px; }
      .mark {
        width: 56px; height: 56px; border-radius: 14px;
        background: linear-gradient(135deg, #4285F4 0%, #8AB4F8 50%, #A78BFA 100%);
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 30px; color: #0B0F19;
      }
      .brand-name { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
      .tag {
        font-size: 16px; font-weight: 600; letter-spacing: 0.28em;
        color: #8AB4F8; text-transform: uppercase;
        border: 1px solid rgba(138,180,248,0.35); border-radius: 999px;
        padding: 9px 18px;
      }
      .hero h1 {
        font-size: 74px; line-height: 1.02; font-weight: 800;
        letter-spacing: -0.03em; margin-bottom: 8px; white-space: nowrap;
      }
      .grad {
        background: linear-gradient(135deg, #4285F4 0%, #8AB4F8 48%, #A78BFA 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .sub {
        margin-top: 26px; font-size: 27px; font-weight: 400; white-space: nowrap;
        color: #C7CBD4; line-height: 1.4;
      }
      .bottom { display: flex; align-items: center; justify-content: space-between; }
      .chips { display: flex; gap: 12px; }
      .chip {
        font-size: 18px; font-weight: 600; color: #E5E7EB; white-space: nowrap;
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 999px; padding: 9px 16px;
      }
      .url { font-size: 24px; font-weight: 700; color: #8AB4F8; }
    </style>
  </head>
  <body>
    <div class="top">
      <div class="brand">
        <div class="mark">A</div>
        <div class="brand-name">FechTin AI</div>
      </div>
      <div class="tag">🎮 Đấu Trí</div>
    </div>

    <div class="hero">
      <h1><span class="grad">Thuyết Khách Hành</span></h1>
      <div class="sub">
        Mỗi cuộc đối thoại là một trận đấu trí.<br />
        Thuyết phục AI thay đổi quan điểm và chinh phục bảng xếp hạng.
      </div>
    </div>

    <div class="bottom">
      <div class="chips">
        <div class="chip">Crush lạnh lùng</div>
        <div class="chip">Sếp khó tính</div>
        <div class="chip">Siêu anh hùng</div>
        <div class="chip">Người gác cổng thời gian</div>
      </div>
      <div class="url">game.fechtin.com</div>
    </div>
  </body>
</html>
