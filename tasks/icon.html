<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; padding: 0; }
      .tile {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #4285F4 0%, #6D7BF0 45%, #A78BFA 100%);
      }
      svg {
        width: 54%;
        height: 54%;
        filter: drop-shadow(0 4px 10px rgba(11, 15, 25, 0.35));
      }
    </style>
  </head>
  <body>
    <div class="tile">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 44 L32 16 L44 44" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <path d="M24.5 35 H39.5" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" fill="none" />
      </svg>
    </div>
  </body>
</html>
